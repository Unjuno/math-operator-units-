plan:
  id: bias_fusion_surface_v4_v2
  supersedes: bias_fusion_surface_v4_v1
  status: prospective_before_target_gpu_pilot
  document: docs/experiment_plan_v2.md
  smoke:
    config: configs/experiments/gpt_bias_fusion_factory_surface_v4_smoke.yaml
    scientific_evidence: false
  pilot:
    configs:
      - configs/experiments/model_design_pilot_identity_unanchored.yaml
      - configs/experiments/model_design_pilot_identity_retention.yaml
      - configs/experiments/model_design_pilot_weak_unanchored.yaml
      - configs/experiments/model_design_pilot_weak_retention.yaml
    seeds: [0]
    splits: [validation]
    primary_metric: trace_validity
    primary_quantity: raw_sum_minus_relevant_specialist
    eligibility:
      pair_audit_must_pass: true
      minimum_mean_relevant_trace_validity: 0.80
      maximum_guardrail_deficit_from_best: 0.02
    clear_winner_gap: 0.02
    near_tie_tolerance: 0.01
    near_tie_inactive_drift_reduction: 0.20
    retention_minimum_drift_reduction: 0.10
    retention_maximum_relevant_regression: 0.02
    ambiguous_action: repeat_all_four_conditions_on_one_additional_seed
    no_eligible_action: stop_and_version_new_model_construction_plan
  production:
    config: configs/experiments/gpt_bias_fusion_factory_surface_v4.yaml
    seeds: [0, 1, 2]
    models_per_seed: 7
    endpoint_policy: validation_selected
  contingency:
    calibration_split: validation
    calibration_evaluation_seed: 703000
    calibration_examples_per_operator: 128
    activation:
      mean_trace_gap_below: -0.02
      worst_operator_trace_gap_below: -0.05
      mean_eos_gap_below: -0.02
      final_data_may_trigger_tuning: false
    validation:
      method: leave_one_training_seed_out
      folds: 3
      tune_per_seed: false
      tune_per_operator: false
    fixed_baselines: [raw_sum, bias_mean]
    stage_order: [global_shrinkage, norm_controlled, static_weighted_mean, consensus_tempered]
    global_shrinkage:
      alpha_grid: [0.10, 0.20, 0.25, 0.50, 0.75, 1.00]
    norm_controlled:
      variants: [rms_equalized_mean, rms_clipped_sum]
      clip_quantiles: [0.90, 0.95, 0.99]
      operator_specific_scales: false
      alpha_grid_from: global_shrinkage
    static_weighted_mean:
      parameterization: alpha_times_softmax_unit_weights
      input_dependent: false
      regularize_toward_uniform: true
      alpha_grid_from: global_shrinkage
    consensus_tempered:
      distance: jsd_to_uniform_probability_consensus
      beta_grid: [0.5, 1.0, 2.0]
      trained_router: false
      alpha_grid_from: global_shrinkage
    eligibility:
      mean_trace_improvement_over_raw: 0.02
      minimum_eos_gap_to_relevant: -0.02
      minimum_final_value_gap_to_relevant: -0.02
      minimum_worst_operator_trace_gap: -0.05
      minimum_improved_held_out_seeds: 2
    selection:
      choose_first_eligible_family: true
      refit_on_all_validation: true
      freeze_mixer_contract: true
      no_eligible_action: stop_nonrouter_search
    learned_router_followup:
      part_of_confirmatory_final: false
      requires_new_plan_and_output_roots: true
      requires_dedicated_calibration_partition: true
      oracle_upper_bound: known_operator_tag_router
  final:
    evaluation_seed: 700000
    splits: [iid_test, operand_ood, length_ood]
    examples_per_operator: 64
    primary_subset: 31
    primary_condition: raw_sum
    primary_alpha: 1.0
    comparator: relevant_specialist
    primary_metric: trace_validity
    preserved_mean_gap: -0.02
    preserved_worst_operator_gap: -0.05
    material_failure_mean_gap: -0.10
    material_failure_eos_gap: -0.05
    fixed_secondary_condition: bias_mean
    selected_rescue_is_secondary: true
  reporting:
    replication_unit: training_seed
    formal_p_values: false
    preserve_raw_result_as_confirmatory: true
  reserved_until_frozen: [iid_test, operand_ood, length_ood]
