policy_version: 1
purpose: decide whether a catalog operator can become a learned unit or runtime fusion unit

core_rule: "No rule, no evaluator, no verifier, no dataset regularity -> no learned unit."

levels:
  L0:
    name: candidate
    meaning: name collected from a source catalog
    allowed_uses:
      - planning
      - source_catalog
    required_fields:
      - source
      - source_name
  L1:
    name: specified
    meaning: canonical token, kind, domain, and type signature exist
    allowed_uses:
      - backlog
      - tokenizer_capacity_planning
    required_fields:
      - opcode
      - canonical_token
      - kind
      - domain
      - type_signature
  L2:
    name: evaluable
    meaning: exact evaluator, numeric evaluator, verifier, program definition, or dataset scoring rule exists
    allowed_uses:
      - benchmark_design
      - evaluator_design
    required_fields:
      - supervision_source
      - evaluator_fn_or_verifier_fn_or_program_or_scoring_rule
      - domain_restrictions
  L3:
    name: trainable
    meaning: train/validation/test and negative distributions are defined
    allowed_uses:
      - unit_training
      - corrector_training
    required_fields:
      - train_distribution
      - validation_distribution
      - test_distribution
      - negative_distribution
      - failure_modes
  L4:
    name: fusible
    meaning: unit, corrector, metrics, and compatibility metadata exist
    allowed_uses:
      - runtime_fusion_manifest
    required_fields:
      - trained_unit
      - corrector_or_no_corrector_justification
      - metrics
      - tokenizer_profile
      - vocab_hash
      - registry_assignment_hash
      - output_space_id

supervision_sources:
  exact_generator:
    trainable: true
    description: exact programmatic target generation
  numeric_evaluator:
    trainable: true
    description: numeric target generation with tolerance and domain restrictions
  verifier:
    trainable: conditional
    description: output can be checked even if generation is hard
  dataset:
    trainable: conditional
    description: stable pattern can be learned from curated data and scoring rules
  program:
    trainable: false
    description: operator is represented as a composition over existing operators unless distilled later
  tool:
    trainable: false
    description: external tool-backed operation with reproducible interface
  none:
    trainable: false
    description: may remain candidate/spec-only but cannot become learned unit

implementation_mode_rules:
  unit:
    minimum_level: L3
    requires:
      - evaluator_or_verifier_or_dataset_scoring
      - train_distribution
      - negative_distribution
  distilled_unit:
    minimum_level: L3
    requires:
      - source_program
      - distillation_dataset
      - comparison_against_program
  program:
    minimum_level: L2
    requires:
      - program_definition
      - dependencies_exist
  tool:
    minimum_level: L2
    requires:
      - reproducible_tool_interface
      - failure_policy
  spec_only:
    minimum_level: L0
    requires: []
  dataset_backed:
    minimum_level: L3
    requires:
      - dataset
      - scoring_rule
      - bias_or_label_audit

runtime_fusion_rule:
  minimum_level: L4
  require_trained_corrector: true
  allow_no_corrector_only_if: explicit_no_corrector_justification
  require_metrics:
    - single_accuracy
    - fusion_accuracy
    - inactive_leakage_mean
    - inactive_leakage_p95
    - false_neutral_rate
  require_compatibility_metadata:
    - tokenizer_profile
    - vocab_hash
    - registry_assignment_hash
    - output_space_id

final_workflow:
  - search_broadly
  - specify_carefully
  - evaluate_strictly
  - train_narrowly
  - fuse_only_validated_units
