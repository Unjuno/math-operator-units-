[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "operator-unit-fusion"
version = "0.1.0"
description = "Typed operator-unit fusion experiments with fixed tokenizer ABI and runtime fusion manifests."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "PyYAML>=6.0",
  "torch>=2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[project.scripts]
opfusion-audit = "opfusion.audit:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/opfusion"]
