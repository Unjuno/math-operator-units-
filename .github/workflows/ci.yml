name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Validate Python modules
        run: python -m compileall -q src tests
      - name: Validate shell launchers
        run: >-
          bash -n
          scripts/bootstrap_arch_linux.sh
          scripts/run_operator_factory_cuda.sh
          scripts/watch_operator_factory.sh
          scripts/run_bias_fusion_factory_v2.sh
          scripts/watch_bias_fusion_factory_v2.sh
          scripts/run_bias_fusion_factory_surface_v3.sh
          scripts/watch_bias_fusion_factory_surface_v3.sh
          scripts/run_bias_fusion_factory_surface_v4.sh
          scripts/watch_bias_fusion_factory_surface_v4.sh
          scripts/run_model_design_pilot.sh
          scripts/watch_model_design_pilot.sh
          scripts/status_model_design_pilot.sh
      - name: Audit canonical repository contract
        run: |
          set +e
          opfusion-audit . --data-samples-per-operator 32 > repository-audit.json
          status=$?
          cat repository-audit.json
          exit $status
      - name: Upload repository audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit-${{ matrix.python-version }}
          path: repository-audit.json
          if-no-files-found: error
      - name: Audit canonical generated data
        run: >-
          opfusion-audit-data-design
          --config configs/experiments/gpt_bias_fusion_factory_surface_v4.yaml
          --samples-per-operator 64
      - name: Validate guarded production plan
        run: >-
          opfusion-train-batch-design
          --config configs/experiments/gpt_bias_fusion_factory_surface_v4.yaml
          --plan-only
      - name: Run tests
        run: pytest -q --junitxml=pytest-report.xml
      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest-report.xml
          if-no-files-found: error
